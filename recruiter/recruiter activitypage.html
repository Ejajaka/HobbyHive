      date.setHours(parseInt(hours, 10));
      date.setMinutes(parseInt(minutes, 10));
      
      return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    };

    const formatDateTime = (dateTimeString) => {
      const date = new Date(dateTimeString);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      let dateStr;
      if (date.toDateString() === today.toDateString()) {
        dateStr = 'Today';
      } else if (date.toDateString() === yesterday.toDateString()) {
        dateStr = 'Yesterday';
      } else {
        dateStr = formatDateShort(dateTimeString);
      }
      
      return `${dateStr} at ${date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;
    };
    
    const formatDistanceToNow = (dateTimeString) => {
      const date = new Date(dateTimeString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);
      
      let interval = seconds / 31536000;
      if (interval > 1) {
        return Math.floor(interval) + 'y ago';
      }
      
      interval = seconds / 2592000;
      if (interval > 1) {
        return Math.floor(interval) + 'mo ago';
      }
      
      interval = seconds / 86400;
      if (interval > 1) {
        return Math.floor(interval) + 'd ago';
      }
      
      interval = seconds / 3600;
      if (interval > 1) {
        return Math.floor(interval) + 'h ago';
      }
      
      interval = seconds / 60;
      if (interval > 1) {
        return Math.floor(interval) + 'm ago';
      }
      
      return 'just now';
    };

    // Event Form Component
    const EventForm = ({ event, onSubmit }) => {
      const today = getFormattedToday();
      
      const initialEventData = event || {
        id: `e${Date.now()}`,
        title: '',
        date: today,
        startTime: '09:00',
        endTime: '10:00',
        description: '',
        location: '',
        participants: []
      };
      
      const [eventData, setEventData] = React.useState(initialEventData);
      const [participantInput, setParticipantInput] = React.useState('');
      const [dateError, setDateError] = React.useState('');
      const [startTimeError, setStartTimeError] = React.useState('');
      const [endTimeError, setEndTimeError] = React.useState('');
      
      // Validate time when component mounts or when date/times change
      React.useEffect(() => {
        validateTimes(eventData.date, eventData.startTime, eventData.endTime);
      }, [eventData.date, eventData.startTime, eventData.endTime]);
      
      const validateTimes = (date, startTime, endTime) => {
        // Reset errors first
        setStartTimeError('');
        setEndTimeError('');
        
        // Only validate times if date is today
        if (date === today) {
          // Validate start time
          if (!isTimeValid(date, startTime)) {
            setStartTimeError('Please select a time that is now or later.');
          }
          
          // Validate end time
          if (!isTimeValid(date, endTime)) {
            setEndTimeError('Please select a time that is now or later.');
          }
        }
        
        // Validate that end time is after start time
        if (startTime && endTime) {
          const [startHours, startMinutes] = startTime.split(':').map(Number);
          const [endHours, endMinutes] = endTime.split(':').map(Number);
          
          if (
            endHours < startHours || 
            (endHours === startHours && endMinutes <= startMinutes)
          ) {
            setEndTimeError('End time must be after start time.');
          }
        }
      };
      
      const handleChange = (e) => {
        const { name, value } = e.target;
        
        if (name === 'date') {
          if (!isDateValid(value)) {
            setDateError('Please select a date that is today or later.');
          } else {
            setDateError('');
          }
        }
        
        setEventData(prev => ({ ...prev, [name]: value }));
      };
      
      const handleAddParticipant = () => {
        if (!participantInput.trim()) return;
        
        setEventData(prev => ({
          ...prev,
          participants: [...prev.participants, participantInput.trim()]
        }));
        
        setParticipantInput('');
      };
      
      const handleRemoveParticipant = (index) => {
        setEventData(prev => ({
          ...prev,
          participants: prev.participants.filter((_, i) => i !== index)
        }));
      };
      
      const handleSubmit = (e) => {
        e.preventDefault();
        
        // Validate date
        if (!isDateValid(eventData.date)) {
          setDateError('Please select a date that is today or later.');
          return;
        }
        
        // Validate times
        validateTimes(eventData.date, eventData.startTime, eventData.endTime);
        
        // Only submit if there are no errors
        if (!dateError && !startTimeError && !endTimeError) {
          onSubmit(eventData);
        }
      };
      
      return (
        <form onSubmit={handleSubmit} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-300 mb-2">Title</label>
            <input
              type="text"
              name="title"
              value={eventData.title}
              onChange={handleChange}
              placeholder="Event title"
              className="w-full"
              required
            />
          </div>
          
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-300 mb-2">Date</label>
              <input
                type="date"
                name="date"
                value={eventData.date}
                onChange={handleChange}
                className={`w-full ${dateError ? 'border-red-500' : ''}`}
                min={today}
                required
              />
              {dateError && (
                <div className="date-error flex items-center mt-1">
                  <LucideIcons.AlertCircle className="h-3.5 w-3.5 mr-1" />
                  <span>{dateError}</span>
                </div>
              )}
            </div>
            
            <div>
              <label className="block text-sm font-medium text-gray-300 mb-2">Location</label>
              <input
                type="text"
                name="location"
                value={eventData.location}
                onChange={handleChange}
                placeholder="Location"
                className="w-full"
                required
              />
            </div>
          </div>
          
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-300 mb-2">Start Time</label>
              <input
                type="time"
                name="startTime"
                value={eventData.startTime}
                onChange={handleChange}
                className={`w-full ${startTimeError ? 'border-red-500' : ''}`}
                required
              />
              {startTimeError && (
                <div className="time-error flex items-center mt-1">
                  <LucideIcons.AlertCircle className="h-3.5 w-3.5 mr-1" />
                  <span>{startTimeError}</span>
                </div>
              )}
            </div>
            
            <div>
              <label className="block text-sm font-medium text-gray-300 mb-2">End Time</label>
              <input
                type="time"
                name="endTime"
                value={eventData.endTime}
                onChange={handleChange}
                className={`w-full ${endTimeError ? 'border-red-500' : ''}`}
                required
              />
              {endTimeError && (
                <div className="time-error flex items-center mt-1">
                  <LucideIcons.AlertCircle className="h-3.5 w-3.5 mr-1" />
                  <span>{endTimeError}</span>
                </div>

          <div>

            <textarea
              name="description"

              onChange={handleChange}
              placeholder="Event description"

          <div>

            <div className="flex mb-2">

              <button

          <div className="pt-2">
            <button

              disabled={dateError !== '' || startTimeError !== '' || endTimeError !== ''}
            >

        </form>

    const ChatPanel = ({ conversations, setConversations, messages, setMessages, setTimeoutIds }) => {
  const [selectedConversation, setSelectedConversation] = React.useState(null);
  const [messageInput, setMessageInput] = React.useState('');
  const { showToast } = React.useContext(AppContext);

  // Load messages when a conversation is selected
  React.useEffect(() => {
    if (selectedConversation) {
      // Mark messages as read
      const conversationMessages = [...(messages[selectedConversation.id] || [])];
      const updatedMessages = conversationMessages.map(msg => {
        if (msg.senderId !== 'current-user' && !msg.read) {
          return { ...msg, read: true };
        }
        return msg;
      });
      
      setMessages(prev => ({ 
        ...prev, 
        [selectedConversation.id]: updatedMessages 
      }));
      
      // Update conversation unread count
      setConversations(prev =>
        prev.map(conv => 
          conv.id === selectedConversation.id 
            ? { ...conv, unreadCount: 0 }
            : conv
        )
      );
    }
  }, [selectedConversation]);

  const handleSendMessage = (e) => {
    e.preventDefault();
    
    if (!messageInput.trim() || !selectedConversation) return;
    
    // Create new message
    const newMsg = {
      id: `m${Date.now()}`,
      senderId: 'current-user',
      receiverId: selectedConversation.participantId,
      content: messageInput,
      timestamp: new Date().toISOString(),
      read: false
    };
    
    // Update messages state
    setMessages(prev => ({
      ...prev,
      [selectedConversation.id]: [
        ...(prev[selectedConversation.id] || []),
        newMsg
      ]
    }));
    
    // Update conversation preview
    setConversations(prev =>
      prev.map(conv => 
        conv.id === selectedConversation.id 
          ? { 
              ...conv, 
              lastMessage: messageInput,
              lastMessageTime: new Date().toISOString()
            }
          : conv
      )
    );
    
    setMessageInput('');
    
    // Create participant-specific responses
    const participantResponses = {
      '1': [ // Alex Johnson (UX Designer)
        "That's an interesting perspective on UX design.",
        "I've been thinking about similar design patterns recently.",
        "Have you considered the accessibility implications of that approach?",
        "Let's discuss this in our next design review.",
        "I'll prototype some alternatives and share them with you."
      ],
      '2': [ // Samantha Lee (Frontend Developer)
        "I'll look into that and get back to you.",
        "Thanks for the update!",
        "That sounds good to me.",
        "When do you need this by?",
        "Can we discuss this in our next meeting?"
      ],
      '3': [ // David Chen (Data Scientist)
        "I'll analyze the data and share my findings.",
        "That's an interesting data point to consider.",
        "Have you looked at the statistical significance of those results?",
        "Let me run some models on that data.",
        "The correlation seems promising, but we should check for causation."
      ],
      '4': [ // Priya Patel (Product Manager)
        "How does this align with our product roadmap?",
        "Let's discuss the business impact of this decision.",
        "Have you considered the user needs behind this feature?",
        "I'll add this to our next sprint planning.",
        "What metrics will we use to measure success?"
      ],
      '5': [ // Michael Washington (Full Stack Developer)
        "I'll check the backend implementation for that.",
        "Have you considered the performance implications?",
        "Let me review the API contracts for that feature.",
        "We should probably add some error handling for that case.",
        "I'll write some tests to cover this scenario."
      ]
    };
    
    // Store the timeout ID so we can clean it up later
    const timeoutId = setTimeout(() => {
      // Only reply sometimes
      if (Math.random() > 0.3) {
        const participantId = selectedConversation.participantId;
        const replies = participantResponses[participantId] || [
          "I'll get back to you on that.",
          "Thanks for your message.",
          "Let me think about that.",
          "Interesting point.",
          "I'll follow up soon."
        ];
        
        const replyMsg = {
          id: `m${Date.now() + 1}`,
          senderId: participantId,
          receiverId: 'current-user',
          content: replies[Math.floor(Math.random() * replies.length)],
          timestamp: new Date().toISOString(),
          read: true
        };
        
        setMessages(prev => ({
          ...prev,
          [selectedConversation.id]: [
            ...(prev[selectedConversation.id] || []),
            replyMsg
          ]
        }));
        
        setConversations(prev =>
          prev.map(conv => 
            conv.id === selectedConversation.id 
              ? { 
                  ...conv, 
                  lastMessage: replyMsg.content,
                  lastMessageTime: replyMsg.timestamp
                }
              : conv
          )
        );
      }
    }, 1000 + Math.random() * 2000);

    setTimeoutIds(prev => [...prev, timeoutId]);
  };
  
  return (
    <>
      <div className="w-1/3 bg-gradient-dark border-r border-gray-700 flex flex-col overflow-hidden">
        <div className="p-5 border-b border-gray-700">
          <h3 className="font-medium text-white">Messages</h3>
        </div>
        
        <div className="flex-1 overflow-y-auto">
          <ConversationList
            conversations={conversations}
            selectedConversation={selectedConversation}
            onSelectConversation={setSelectedConversation}
          />

        {selectedConversation ? (
          <>
            <div className="p-4 border-b border-gray-700 flex items-center">

              />

            </div>
            
            <div className="flex-1 overflow-y-auto p-4">
              <MessageList 
                messages={messages[selectedConversation.id] || []} 
                currentUserId="current-user"
              />
            </div>
            
            <form 
              className="p-4 border-t border-gray-700 flex items-center"
              onSubmit={handleSendMessage}
            >
              <input 
                type="text"

  );
};

          try {
            await navigator.share({
              title: post.title,
              text: post.content,
              url: window.location.href,
            });
            showToast('Post shared successfully!');

            console.error('Error sharing:', error);
            // Fallback to clipboard
            copyToClipboard();
          }
        } else {
          // Fallback for browsers that don't support Web Share API
          copyToClipboard();
        }
      };
      
      const copyToClipboard = () => {
        const shareText = `${post.title}\n\n${post.content}\n\nShared from HobbyHive`;
        navigator.clipboard.writeText(shareText).then(() => {
          showToast('Link copied to clipboard!');
        }).catch(err => {
          console.error('Failed to copy:', err);
          showToast('Failed to copy link. Please try again.');

        <Sidebar />
        <div className="flex-1 flex overflow-hidden">
          {activeSection === 'search' && <SearchPanel />}
          {activeSection === 'calendar' && <CalendarPanel />}
          {activeSection === 'todo' && <TodoPanel />}
          {activeSection === 'chat' && (
            <ChatPanel 
              conversations={conversations}
              setConversations={setConversations}
              messages={messages}
              setMessages={setMessages}
              setTimeoutIds={setTimeoutIds}
            />
          )}
        </div>
        
        {showModal && (
          <Modal title={modalTitle} onClose={handleCloseModal}>
            {modalContent}
          </Modal>
        )}
        
        {toast.show && <Toast message={toast.message} />}
      </div>
    </AppContext.Provider>
  );
};
    
    // App Component (Entry point)
    const App = () => {
      return (
        <div className="flex flex-col min-h-screen bg-[rgb(10,17,34)] text-white">
          <header className="fixed top-0 left-0 right-0 bg-gradient-dark z-50 h-12">
            <div className="flex items-center h-full px-4">
              <button 
                className="text-gray-400 hover:text-white transition-colors"
                onClick={() => window.location.href='https://singular-kringle-5f87fe.netlify.app/recruiter%20dashboard'}
              >
                <LucideIcons.ArrowLeft className="h-5 w-5" />
              </button>
              <h1 className="ml-4 text-lg font-semibold">Recruiter Dashboard</h1>
              <div className="ml-auto flex items-center">
                
              </div>
            </div>
          </header>
          <main className="flex-grow pt-12">
            <Dashboard />
          </main>
        </div>
      );
    };
    
    // Render the App
    ReactDOM.createRoot(document.getElementById('root')).render(
      <React.StrictMode>
        <App />
      </React.StrictMode>
    );
  </script>
</body>
</html>
