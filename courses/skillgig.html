      // Custom hooks
      function useLocalStorage(key, initialValue) {
        const [storedValue, setStoredValue] = React.useState(() => {
          if (typeof window === 'undefined') {
            return initialValue;
          }
          
          try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
          } catch (error) {
            console.warn(`Error reading localStorage key "${key}":`, error);
            return initialValue;
          }
        });
        
        const setValue = (value) => {
          try {
            const valueToStore = value instanceof Function ? value(storedValue) : value;
            setStoredValue(valueToStore);
            
            if (typeof window !== 'undefined') {
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            }
          } catch (error) {
            console.warn(`Error setting localStorage key "${key}":`, error);
          }
        };
        
        React.useEffect(() => {
          const handleStorageChange = (e) => {
            if (e.key === key && e.newValue) {
              setStoredValue(JSON.parse(e.newValue));
            }
          };
          
          if (typeof window !== 'undefined') {
            window.addEventListener('storage', handleStorageChange);
            return () => window.removeEventListener('storage', handleStorageChange);
          }
        }, [key]);
        
        return [storedValue, setValue];

      // Main App Component
      function App() {
        // State management
        const [savedJobs, setSavedJobs] = useLocalStorage('savedJobs', []);
        const [preferences, setPreferences] = useLocalStorage('preferences', {
          remoteOnly: true,
          minHourlyRate: 45,
          availability: 'Full-time'
        });
        const [searchHistory, setSearchHistory] = useLocalStorage('searchHistory', []);
        
        const [selectedJob, setSelectedJob] = React.useState(null);
        const [isModalOpen, setIsModalOpen] = React.useState(false);
        const [toast, setToast] = React.useState({ message: '', type: '', visible: false });
        const [appliedJobs, setAppliedJobs] = useLocalStorage('appliedJobs', [
          {
            id: 'applied1',
            title: 'Frontend Developer',
            company: 'TechCorp Inc.',
            appliedDate: 'Mar 15, 2024',
            status: 'In Review'
          },
          {
            id: 'applied2',
            title: 'Backend Developer',
            company: 'DataTech Solutions',
            appliedDate: 'Mar 12, 2024',
            status: 'Accepted'
          }
        ]);
        
        // Offers state with React state for visibility handling
        const [visibleOffers, setVisibleOffers] = React.useState(offers);
        
        // Dropdowns state
        const [activeDropdown, setActiveDropdown] = React.useState(null);
        
        // Search state
        const [searchQuery, setSearchQuery] = React.useState('');
        
        // Filter jobs based on preferences and search query
        const filteredJobs = jobs.filter(job => {
          // First apply preference filters
          if (preferences.remoteOnly && job.location !== 'Remote') {
            return false;
          }
          const minRate = job.salary.match(/\$(\d+)/);
          if (minRate && parseInt(minRate[1]) < preferences.minHourlyRate) {
            return false;
          }
          
          // Then apply search filter if there is a search query
          if (searchQuery) {
            const searchableText = `${job.title} ${job.company} ${job.description} ${job.salary} ${job.location}`.toLowerCase();
            return searchableText.includes(searchQuery.toLowerCase());
          }
          
          return true;
        });
        
        // Handle saving jobs
        const toggleSaveJob = (jobId) => {
          if (savedJobs.includes(jobId)) {
            setSavedJobs(savedJobs.filter(id => id !== jobId));
            showToast('Job removed from saved');
          } else {
            setSavedJobs([...savedJobs, jobId]);
            showToast('Job saved for later', 'success');
          }
        };
        
        // Handle applying for jobs
        const applyForJob = (job) => {
          const alreadyApplied = appliedJobs.some(j => j.id === job.id);
          if (alreadyApplied) {
            showToast('You have already applied to this job', 'warning');
            return;
          }
          
          const currentDate = new Date();
          const formattedDate = `${currentDate.toLocaleString('default', { month: 'short' })} ${currentDate.getDate()}, ${currentDate.getFullYear()}`;
          
          const newApplication = {
            id: job.id,
            title: job.title,
            company: job.company,
            appliedDate: formattedDate,
            status: 'In Review'
          };
          
          setAppliedJobs([...appliedJobs, newApplication]);
          showToast('Application submitted successfully!', 'success');
          setIsModalOpen(false);
        };
        
        // Handle offer actions (accept/decline)
        const handleOfferAction = (offerId, action) => {
          // Remove the offer from visible offers
          setTimeout(() => {
            setVisibleOffers(visibleOffers.filter(offer => offer.id !== offerId));
          }, action === 'accept' ? 1500 : 0); // Delay removal if accepted to show "Accepted" state
          
          showToast(
            action === 'accept' ? 'Offer accepted successfully!' : 'Offer declined',
            action === 'accept' ? 'success' : 'warning'
          );
        };
        
        // Add to recent searches
        const addToRecentSearches = (job) => {
          const existingIndex = searchHistory.findIndex(item => item.id === job.id);
          
          if (existingIndex !== -1) {
            const updatedHistory = [...searchHistory];
            const [removed] = updatedHistory.splice(existingIndex, 1);
            removed.timeAgo = 'Just now';
            setSearchHistory([removed, ...updatedHistory]);
          } else {
            const newSearch = {
              id: job.id,
              title: job.title,
              company: job.company,
              salary: job.salary,
              location: job.location,
              imageUrl: job.imageUrl,
              timeAgo: 'Just now'
            };
            setSearchHistory([newSearch, ...searchHistory].slice(0, 5));
          }
        };
        
        // Open job modal
        const openJobModal = (job) => {
          setSelectedJob(job);
          addToRecentSearches(job);
          setIsModalOpen(true);
        };
        
        // Show toast notification
        const showToast = (message, type = 'success') => {
          setToast({ message, type, visible: true });
          setTimeout(() => {
            setToast(prev => ({ ...prev, visible: false }));
          }, 3000);
        };
        
        // Toggle dropdowns
        const toggleDropdown = (id) => {
          setActiveDropdown(activeDropdown === id ? null : id);
        };
        
        // Close dropdowns when clicking outside
        React.useEffect(() => {
          const handleClickOutside = (e) => {
            const target = e.target;
            if (activeDropdown && !target.closest('.dropdown')) {
              setActiveDropdown(null);
            }
          };
          
          document.addEventListener('click', handleClickOutside);
          return () => {
            document.removeEventListener('click', handleClickOutside);
          };
        }, [activeDropdown]);

        // Handle search input changes from the search bar
        React.useEffect(() => {
          const searchInput = document.getElementById('searchInput');
          if (!searchInput) return;
          
          const handleSearchChange = (e) => {
            setSearchQuery(e.target.value);
          };
          
          searchInput.addEventListener('input', handleSearchChange);
          
          // Custom event for when a job is selected from search results
          document.addEventListener('openJobModal', (e) => {
            const jobId = e.detail.jobId;
            const job = [...jobs, ...offers].find(item => item.id === jobId);
            if (job) {
              openJobModal(job);
            }
          });
          
          return () => {
            searchInput.removeEventListener('input', handleSearchChange);
            document.removeEventListener('openJobModal', () => {});
          };
        }, []);
        
        return (
          <div className="min-h-screen flex flex-col bg-bg text-gray-200">
            {/* Navigation Bar */}
            <nav className="fixed top-0 left-0 right-0 z-10 bg-container/70 backdrop-blur-sm border-b border-gray-700 shadow-md">

                  <Palette className="h-6 w-6 text-purple-400" />
                  <span>HobbyHive</span>
                </a>
                
                <div className="relative w-1/3">
                  <div className="relative">
                    <input

  // Initialize dropdown functionality
  function initializeDropdowns() {
    console.log("Initializing dropdowns");
    
    // Get the dropdown elements
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');
    const notificationBtn = document.getElementById('notificationBtn');
    const notificationDropdown = document.getElementById('notificationDropdown');
    
    if (!profileBtn || !profileDropdown || !notificationBtn || !notificationDropdown) {
      console.error("Could not find dropdown elements");
      return;
    }
    
    console.log("Found all dropdown elements");
    
    let activeDropdown = null;

    // Toggle profile dropdown
    profileBtn.addEventListener('click', function(e) {
      console.log("Profile button clicked");
      e.stopPropagation();
      if (activeDropdown && activeDropdown !== profileDropdown) {
        activeDropdown.classList.remove('active');
      }
      profileDropdown.classList.toggle('active');
      activeDropdown = profileDropdown.classList.contains('active') ? profileDropdown : null;
      
      // Close notification dropdown if open
      notificationDropdown.classList.remove('active');
    });

    // Toggle notification dropdown
    notificationBtn.addEventListener('click', function(e) {
      console.log("Notification button clicked");
      e.stopPropagation();
      if (activeDropdown && activeDropdown !== notificationDropdown) {
        activeDropdown.classList.remove('active');
      }
      notificationDropdown.classList.toggle('active');
      activeDropdown = notificationDropdown.classList.contains('active') ? notificationDropdown : null;
      
      // Close profile dropdown if open
      profileDropdown.classList.remove('active');
    });

    // Close dropdowns when clicking outside
    document.addEventListener('click', function() {
      if (activeDropdown) {
        activeDropdown.classList.remove('active');
        activeDropdown = null;
      }
    });

    // Prevent dropdown from closing when clicking inside
    profileDropdown.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    notificationDropdown.addEventListener('click', function(e) {
      e.stopPropagation();
    });
    
    console.log("Dropdown event listeners added");
  }

  // Search functionality
  function initializeSearch() {
    const searchInput = document.getElementById('searchInput');
    const clearSearchBtn = document.getElementById('clearSearch');
    const searchResults = document.getElementById('searchResults');
    const searchResultsList = document.getElementById('searchResultsList');
    const resultsCount = document.getElementById('resultsCount');
    const noResults = document.getElementById('noResults');
    
    if (!searchInput || !searchResults || !searchResultsList || !clearSearchBtn || !resultsCount || !noResults) {
      console.error("Could not find search elements");
      return;
    }
    
    // All searchable data (jobs and offers combined)
    const allSearchableData = [...jobs, ...offers];
    
    // Debounce function to limit search frequency
    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }
    
    // Function to highlight matching text
    function highlightText(text, query) {
      if (!query.trim()) return text;
      
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<span class="highlight">$1</span>');
    }
    
    // Function to search data
    function performSearch(query) {
      if (!query.trim()) {
        searchResults.classList.remove('active');
        clearSearchBtn.style.display = 'none';
        return;
      }
      
      clearSearchBtn.style.display = 'block';
      
      // Filter data based on search query
      const filteredData = allSearchableData.filter(item => {
        const searchableText = `${item.title} ${item.company} ${item.description} ${item.salary} ${item.location}`.toLowerCase();
        return searchableText.includes(query.toLowerCase());
      });
      
      // Update results count
      resultsCount.textContent = filteredData.length;
      
      // Clear previous results
      searchResultsList.innerHTML = '';
      
      if (filteredData.length === 0) {
        noResults.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        
        // Create result items
        filteredData.forEach(item => {
          const resultItem = document.createElement('div');
          resultItem.className = 'search-result-item';
          resultItem.innerHTML = `
            <div class="flex items-start">
              <img src="${item.imageUrl}" alt="${item.company}" class="w-12 h-12 object-cover rounded mr-3">
              <div class="flex-1">
                <h4 class="font-medium text-gray-200">${highlightText(item.title, query)}</h4>
                <p class="text-sm text-gray-400">${highlightText(item.company, query)}</p>
                <div class="flex justify-between text-xs mt-1">
                  <span class="text-gray-300">${item.salary}</span>
                  <span class="text-gray-400">${item.location}</span>
                </div>
              </div>
            </div>
          `;
          
          // Add click event to open job modal
          resultItem.addEventListener('click', () => {
            // Find the job in the App component and open its modal
            const event = new CustomEvent('openJobModal', { 
              detail: { jobId: item.id }
            });
            document.dispatchEvent(event);
            
            // Clear search and hide results
            searchInput.value = '';
            searchResults.classList.remove('active');
            clearSearchBtn.style.display = 'none';
          });
          
          searchResultsList.appendChild(resultItem);
        });
      }
      
      // Show results container
      searchResults.classList.add('active');
      
      // Trigger search for Top Picks section
      const event = new CustomEvent('search', { detail: { query } });
      document.dispatchEvent(event);
    }
    
    // Create debounced search function
    const debouncedSearch = debounce(performSearch, 300);
    
    // Search input event listener
    searchInput.addEventListener('input', function() {
      const query = this.value;
      debouncedSearch(query);
    });
    
    // Focus event listener
    searchInput.addEventListener('focus', function() {
      if (this.value.trim()) {
        searchResults.classList.add('active');
      }
    });
    
    // Clear search button event listener
    clearSearchBtn.addEventListener('click', function() {
      searchInput.value = '';
      searchResults.classList.remove('active');
      this.style.display = 'none';
      searchInput.focus();
      
      // Clear the search query in the React component
      const event = new CustomEvent('search', { detail: { query: '' } });
      document.dispatchEvent(event);
    });
    
    // Close search results when clicking outside
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.classList.remove('active');
      }
    });
    
    // Listen for custom event to open job modal from React component
    document.addEventListener('openJobModal', function(e) {
      const jobId = e.detail.jobId;
      const job = allSearchableData.find(item => item.id === jobId);
      
      if (job) {
        // This will be handled by the React component
        console.log(`Opening job modal for: ${job.title}`);
      }
    });
    
    // Handle escape key to close search
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && searchResults.classList.contains('active')) {
        searchResults.classList.remove('active');
      }
    });
  }

  // Wait for the DOM to be fully loaded
  document.addEventListener('DOMContentLoaded', function() {
    console.log("DOM loaded, initializing icons and search");
    
    // Initialize the Lucide icons
    lucide.createIcons();
    
    // Wait a moment for React to render, then initialize functionality
    setTimeout(() => {
      initializeDropdowns();
      initializeSearch();
    }, 100);
  });

  // Also try initializing on window load as a fallback
  window.addEventListener('load', function() {
    console.log("Window loaded");
    initializeDropdowns();
    initializeSearch();
  });
    </script>
