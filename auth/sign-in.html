<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <style>
        .carousel-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        
        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        .carousel-slide.active {
            opacity: 1;
        }
        
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="min-h-screen flex">
        <!-- Left side - Image Carousel -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-indigo-900">
            <div class="carousel-container">
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 1">
                </div>
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 2">
                </div>
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 3">
                </div>
            </div>
            <div class="absolute inset-0 bg-indigo-900/40"></div>
            <div class="absolute inset-0 flex items-center justify-center text-white z-10">
                <div class="max-w-xl p-8">
                    <h1 class="text-5xl font-bold mb-6">Welcome Back!</h1>
                    <p class="text-xl">Continue your journey with HobbyHive</p>
                </div>
            </div>
        </div>

        <!-- Right side - Login Form -->
        <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 bg-white">
            <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-900">Login to HobbyHive</h2>
                    <p class="mt-2 text-gray-600">Access your account</p>
                </div>

                <!-- Alert Message -->
                <div id="alert-message" class="mb-6 p-4 rounded-md text-white text-center hidden"></div>

                <!-- Toggle Buttons -->
                <div class="flex mb-8 bg-gray-100 rounded-lg p-1">
                    <button id="recruiterBtn" class="flex-1 py-2 px-4 rounded-md transition-all bg-indigo-600 text-white" data-role="recruiter">
                        Recruiter
                    </button>
                    <button id="freelancerBtn" class="flex-1 py-2 px-4 rounded-md transition-all text-gray-600 hover:text-gray-900" data-role="freelancer">
                        Freelancer
                    </button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                <polyline points="22,6 12,13 2,6"></polyline>
                            </svg>
                            Email
                        </label>
                        <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Enter your email" required>
                    </div>

                    <div>
                        <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Password
                        </label>
                        <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="••••••••" required>
                    </div>

                    <div class="flex items-center justify-end">
                        <a href="forgot-password.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full flex items-center justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Login
                        <svg class="ml-2 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <p class="mt-6 text-center text-sm text-gray-600">
                    Don't have an account?
                    <a href="sign-up.html" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Force logout any existing session to ensure the form is always shown
            if (getCurrentUser()) {
                console.log('Clearing existing session to ensure login form is shown');
                logoutUser();
                // Don't redirect - stay on this page
            }
            
            // Check for success message from sign-up
            const urlParams = new URLSearchParams(window.location.search);
            const successMsg = urlParams.get('success');
            const email = urlParams.get('email');
            
            if (successMsg) {
                const alertMsg = document.getElementById('alert-message');
                alertMsg.textContent = 'Registration successful! Please log in with your credentials.';
                alertMsg.classList.remove('hidden', 'bg-red-500');
                alertMsg.classList.add('bg-green-500');
                
                // If email was passed, pre-fill it
                if (email) {
                    document.getElementById('email').value = email;
                }
            }
            
            // Carousel functionality
            const slides = document.querySelectorAll('.carousel-slide');
            let currentSlide = 0;

            function showSlide(index) {
                slides.forEach(slide => slide.classList.remove('active'));
                slides[index].classList.add('active');
            }

            function nextSlide() {
                currentSlide = (currentSlide + 1) % slides.length;
                showSlide(currentSlide);
            }

            // Initialize first slide
            showSlide(0);

            // Auto-advance slides every 5 seconds
            setInterval(nextSlide, 5000);

            // Toggle functionality
            const recruiterBtn = document.getElementById('recruiterBtn');
            const freelancerBtn = document.getElementById('freelancerBtn');
            let selectedRole = 'recruiter'; // Default role

            recruiterBtn.addEventListener('click', function() {
                recruiterBtn.classList.add('bg-indigo-600', 'text-white');
                recruiterBtn.classList.remove('text-gray-600');
                freelancerBtn.classList.remove('bg-indigo-600', 'text-white');
                freelancerBtn.classList.add('text-gray-600');
                selectedRole = 'recruiter';
            });

            freelancerBtn.addEventListener('click', function() {
                freelancerBtn.classList.add('bg-indigo-600', 'text-white');
                freelancerBtn.classList.remove('text-gray-600');
                recruiterBtn.classList.remove('bg-indigo-600', 'text-white');
                recruiterBtn.classList.add('text-gray-600');
                selectedRole = 'freelancer';
            });

            // Form submission
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const alertMsg = document.getElementById('alert-message');
                
                // Validate form
                if (!email || !password) {
                    alertMsg.textContent = 'Please fill in all fields';
                    alertMsg.classList.remove('hidden', 'bg-green-500');
                    alertMsg.classList.add('bg-red-500');
                    return;
                }
                
                // Attempt login with role validation
                const result = loginUser(email, password, selectedRole);
                
                if (result === 'role_mismatch') {
                    // User exists but tried to login with wrong role
                    alertMsg.textContent = `Access denied: You're registered as a different type of user. Please select the correct role.`;
                    alertMsg.classList.remove('hidden', 'bg-green-500', 'bg-yellow-500');
                    alertMsg.classList.add('bg-red-500');
                } else if (result) {
                    // Login successful
                    alertMsg.textContent = `Login successful! Redirecting...`;
                    alertMsg.classList.remove('hidden', 'bg-red-500', 'bg-yellow-500');
                    alertMsg.classList.add('bg-green-500');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        redirectToDashboard(result.role);
                    }, 1000);
                } else {
                    // Login failed
                    alertMsg.textContent = 'Invalid email or password';
                    alertMsg.classList.remove('hidden', 'bg-green-500', 'bg-yellow-500');
                    alertMsg.classList.add('bg-red-500');
                }
            });
        });
    </script>
</body>

</html>
