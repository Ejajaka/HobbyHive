<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/auth.js"></script>
  <style>
    .hobby-hive-logo {
      background: linear-gradient(to right, #9747FF, #FF61D3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }
    .hobby-hive-button {
      background: linear-gradient(to right, #9747FF, #FF61D3);
    }
  </style>
</head>
<body class="bg-[#0a1122] text-white">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-3xl hobby-hive-logo">HobbyHive</h1>
        <p class="text-gray-300">Reset Your Password</p>
      </div>
      
      <div class="bg-[#161d2f] rounded-xl shadow-lg p-8">
        <form id="resetForm">
          <div class="space-y-6">
            <div>
              <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                Email Address
              </label>
              <input 
                type="email" 
                id="email" 
                required 
                class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-800 text-white"
                placeholder="your@email.com"
              >
              <p id="emailError" class="mt-1 text-red-500 text-sm hidden"></p>
            </div>
            
            <!-- Role Selection -->
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-2">
                Account Type
              </label>
              <div class="flex bg-gray-700 rounded-lg p-1">
                <button 
                  type="button" 
                  id="recruiterBtn" 
                  class="flex-1 py-2 px-4 rounded-md transition-all bg-purple-600 text-white" 
                >
                  Recruiter
                </button>
                <button 
                  type="button" 
                  id="freelancerBtn" 
                  class="flex-1 py-2 px-4 rounded-md transition-all text-gray-300 hover:text-white" 
                >
                  Freelancer
                </button>
              </div>
              <p class="text-xs text-gray-400 mt-1">Select the account type you're resetting password for</p>
            </div>
            
            <div>
              <label for="newPassword" class="block text-sm font-medium text-gray-300 mb-2">
                New Password
              </label>
              <input 
                type="password" 
                id="newPassword" 
                required 
                class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-800 text-white"
                placeholder="Enter new password"
              >
            </div>
            
            <div>
              <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-2">
                Confirm Password
              </label>
              <input 
                type="password" 
                id="confirmPassword" 
                required 
                class="w-full px-4 py-3 rounded-lg border border-gray-600 bg-gray-800 text-white"
                placeholder="Confirm new password"
              >
              <p id="passwordError" class="mt-1 text-red-500 text-sm hidden"></p>
            </div>
            
            <button 
              type="submit" 
              class="w-full hobby-hive-button text-white font-medium py-3 px-4 rounded-lg hover:opacity-90 transition-opacity"
            >
              Reset Password
            </button>
          </div>
        </form>
        
        <!-- Success message -->
        <div id="successMessage" class="hidden text-center py-6">
          <div class="w-16 h-16 bg-green-800 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-green-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h2 class="text-xl font-semibold text-white mb-2">Password Reset Successful!</h2>
          <p class="text-gray-300 mb-6">Your password has been updated successfully.</p>
          <a href="sign-in.html" class="hobby-hive-button text-white font-medium py-2 px-6 rounded-lg inline-block">
            Go to Login
          </a>
        </div>
        
        <div class="mt-6 text-center">
          <a href="sign-in.html" class="text-gray-300 hover:text-white">
            Back to Sign In
          </a>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Force logout any existing session to ensure the form is always shown
      if (typeof getCurrentUser === 'function' && getCurrentUser()) {
        console.log('Clearing existing session to ensure reset password form is shown');
        logoutUser();
      }
      const resetForm = document.getElementById('resetForm');
      const emailInput = document.getElementById('email');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      const successMessage = document.getElementById('successMessage');
      const recruiterBtn = document.getElementById('recruiterBtn');
      const freelancerBtn = document.getElementById('freelancerBtn');
      
      // Role selection functionality
      let selectedRole = 'recruiter'; // Default role
      
      recruiterBtn.addEventListener('click', function() {
        recruiterBtn.classList.add('bg-purple-600', 'text-white');
        recruiterBtn.classList.remove('text-gray-300');
        freelancerBtn.classList.remove('bg-purple-600', 'text-white');
        freelancerBtn.classList.add('text-gray-300');
        selectedRole = 'recruiter';
      });
      
      freelancerBtn.addEventListener('click', function() {
        freelancerBtn.classList.add('bg-purple-600', 'text-white');
        freelancerBtn.classList.remove('text-gray-300');
        recruiterBtn.classList.remove('bg-purple-600', 'text-white');
        recruiterBtn.classList.add('text-gray-300');
        selectedRole = 'freelancer';
      });
      
      resetForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Reset error messages
        emailError.classList.add('hidden');
        passwordError.classList.add('hidden');
        
        // Get form values
        const email = emailInput.value.trim();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        
        // Check if email exists
        if (!emailExists(email)) {
          emailError.textContent = 'No account found with this email address';
          emailError.classList.remove('hidden');
          return;
        }
        
        // Check if passwords match
        if (newPassword !== confirmPassword) {
          passwordError.textContent = 'Passwords do not match';
          passwordError.classList.remove('hidden');
          return;
        }
        
        // Check password length
        if (newPassword.length < 6) {
          passwordError.textContent = 'Password must be at least 6 characters long';
          passwordError.classList.remove('hidden');
          return;
        }
        
        // Try to reset the password with role
        console.log('Attempting to reset password for:', email, 'with role:', selectedRole);
        const success = resetPassword(email, newPassword, selectedRole);
        
        if (success) {
          // Show success message
          resetForm.classList.add('hidden');
          successMessage.classList.remove('hidden');
        } else {
          // Show error
          passwordError.textContent = 'Failed to reset password. Please verify the email and account type match.';
          passwordError.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
