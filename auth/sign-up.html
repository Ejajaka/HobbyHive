<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/auth.js"></script>
    <style>
        .carousel-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        
        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        
        .carousel-slide.active {
            opacity: 1;
        }
        
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="min-h-screen flex">
        <!-- Left side - Image Carousel -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-indigo-900">
            <div class="carousel-container">
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 1">
                </div>
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 2">
                </div>
                <div class="carousel-slide">
                    <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&q=80&w=1200" alt="HobbyHive 3">
                </div>
            </div>
            <div class="absolute inset-0 bg-indigo-900/40"></div>
            <div class="absolute inset-0 flex items-center justify-center text-white z-10">
                <div class="max-w-xl p-8">
                    <h1 class="text-5xl font-bold mb-6">Welcome to HobbyHive</h1>
                    <p class="text-xl">Connect, Learn, and Grow Together</p>
                </div>
            </div>
        </div>

        <!-- Right side - Sign Up Forms -->
        <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-8 bg-white">
            <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
                    <p class="mt-2 text-gray-600">Join our community today</p>
                </div>

                <!-- Alert Message -->
                <div id="alert-message" class="mb-6 p-4 rounded-md text-white text-center bg-gray-500">Please fill in the form to register</div>

                <!-- Toggle Buttons -->
                <div class="flex mb-8 bg-gray-100 rounded-lg p-1">
                    <button id="recruiterBtn" class="flex-1 py-2 px-4 rounded-md transition-all bg-indigo-600 text-white" data-role="recruiter">
                        Recruiter
                    </button>
                    <button id="freelancerBtn" class="flex-1 py-2 px-4 rounded-md transition-all text-gray-600 hover:text-gray-900" data-role="freelancer">
                        Freelancer
                    </button>
                </div>

                <!-- Sign Up Form -->
                <form id="signupForm" class="space-y-4">
                    <div>
                        <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Username
                        </label>
                        <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Enter your username" required>
                    </div>

                    <div id="recruiterFields">
                        <div>
                            <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                                <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                                    <line x1="12" y1="4" x2="12" y2="20"></line>
                                </svg>
                                Company Name
                            </label>
                            <input type="text" id="companyName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="Enter company name" required>
                        </div>
                        <div class="mt-4">
                            <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                                <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                Company Email
                            </label>
                            <input type="email" id="companyEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="company@example.com" required>
                        </div>
                    </div>

                    <div id="freelancerFields" style="display: none;">
                        <div>
                            <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                                <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                Email
                            </label>
                            <input type="email" id="freelancerEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div>
                        <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Password
                        </label>
                        <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="••••••••" required>
                    </div>

                    <div>
                        <label class="flex items-center text-sm font-medium text-gray-700 mb-1">
                            <svg class="w-4 h-4 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="••••••••" required>
                    </div>

                    <button id="signUpBtn" type="button" class="w-full flex items-center justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Sign Up
                        <svg class="ml-2 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </button>
                </form>

                <p class="mt-4 text-center text-sm text-gray-600">
                    Already have an account?
                    <a href="sign-in.html" class="font-medium text-indigo-600 hover:text-indigo-500">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Force logout any existing session to ensure the form is always shown
            if (getCurrentUser()) {
                console.log('Clearing existing session to ensure signup form is shown');
                logoutUser();
                // Don't redirect - stay on this page
            }

            // Carousel functionality
            const slides = document.querySelectorAll('.carousel-slide');
            let currentSlide = 0;

            function showSlide(index) {
                slides.forEach(slide => slide.classList.remove('active'));
                slides[index].classList.add('active');
            }

            function nextSlide() {
                currentSlide = (currentSlide + 1) % slides.length;
                showSlide(currentSlide);
            }

            // Initialize first slide
            showSlide(0);

            // Auto-advance slides every 5 seconds
            setInterval(nextSlide, 5000);

            // Form toggle functionality
            const recruiterBtn = document.getElementById('recruiterBtn');
            const freelancerBtn = document.getElementById('freelancerBtn');
            const recruiterFields = document.getElementById('recruiterFields');
            const freelancerFields = document.getElementById('freelancerFields');
            let selectedRole = 'recruiter'; // Default role

            recruiterBtn.addEventListener('click', function() {
                recruiterBtn.classList.add('bg-indigo-600', 'text-white');
                recruiterBtn.classList.remove('text-gray-600');
                freelancerBtn.classList.remove('bg-indigo-600', 'text-white');
                freelancerBtn.classList.add('text-gray-600');
                recruiterFields.style.display = 'block';
                freelancerFields.style.display = 'none';
                selectedRole = 'recruiter';
            });

            freelancerBtn.addEventListener('click', function() {
                freelancerBtn.classList.add('bg-indigo-600', 'text-white');
                freelancerBtn.classList.remove('text-gray-600');
                recruiterBtn.classList.remove('bg-indigo-600', 'text-white');
                recruiterBtn.classList.add('text-gray-600');
                recruiterFields.style.display = 'none';
                freelancerFields.style.display = 'block';
                selectedRole = 'freelancer';
            });

            // Form submission handler that handles both the direct button click and the form submit
            function handleSignUp(e) {
                if (e) {
                    e.preventDefault();
                }
                
                // Get form data
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const alertMsg = document.getElementById('alert-message');
                
                // Get email based on role
                let email;
                if (selectedRole === 'recruiter') {
                    email = document.getElementById('companyEmail').value;
                } else {
                    email = document.getElementById('freelancerEmail').value;
                }
                
                // Full validation
                if (!username || !email || !password || !confirmPassword) {
                    alertMsg.textContent = 'Please fill in all required fields';
                    alertMsg.classList.remove('hidden', 'bg-green-500');
                    alertMsg.classList.add('bg-red-500');
                    alertMsg.style.display = 'block';
                    alertMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                
                // Check if passwords match
                if (password !== confirmPassword) {
                    alertMsg.textContent = 'Passwords do not match';
                    alertMsg.classList.remove('hidden', 'bg-green-500');
                    alertMsg.classList.add('bg-red-500');
                    alertMsg.style.display = 'block';
                    alertMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                
                // Check password length
                if (password.length < 6) {
                    alertMsg.textContent = 'Password must be at least 6 characters long';
                    alertMsg.classList.remove('hidden', 'bg-green-500');
                    alertMsg.classList.add('bg-red-500');
                    alertMsg.style.display = 'block';
                    alertMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                
                // Create user object
                const userData = {
                    username,
                    email,
                    password,
                    role: selectedRole
                };
                
                // Add company data for recruiters
                if (selectedRole === 'recruiter' && document.getElementById('companyName').value) {
                    userData.companyName = document.getElementById('companyName').value;
                    userData.companyEmail = email;
                }
                
                // Get existing users or create empty array
                let users = [];
                try {
                    const existingUsers = localStorage.getItem('hobbyhive_users');
                    if (existingUsers) {
                        users = JSON.parse(existingUsers);
                    }
                } catch (e) {
                    console.error('Error reading users:', e);
                }
                
                // Check if email already exists (for any role) using built-in function
                if (emailExists(email)) {
                    alertMsg.textContent = 'An account with this email already exists';
                    alertMsg.classList.remove('hidden', 'bg-green-500');
                    alertMsg.classList.add('bg-red-500');
                    alertMsg.style.display = 'block';
                    alertMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }
                
                // Add new user
                users.push(userData);
                
                // Save to localStorage
                localStorage.setItem('hobbyhive_users', JSON.stringify(users));
                console.log('User data saved:', userData);
                
                // Show success message briefly before redirecting
                alertMsg.textContent = 'Registration successful! Redirecting to sign in...';
                alertMsg.classList.remove('bg-red-500', 'hidden');
                alertMsg.classList.add('bg-green-500');
                alertMsg.style.display = 'block';
                
                // Redirect to sign-in page after a short delay
                setTimeout(() => {
                    window.location.href = 'sign-in.html?email=' + encodeURIComponent(email);
                }, 1000);
            }

            // Attach the handler to both the form submit and button click
            document.getElementById('signUpBtn').addEventListener('click', handleSignUp);
            document.getElementById('signupForm').addEventListener('submit', handleSignUp);
        });
    </script>
</body>

</html>
